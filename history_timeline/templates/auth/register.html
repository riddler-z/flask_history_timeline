{% extends 'base.html' %}

{% block style %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
{% endblock %}

{% block content %}
<main class="form_auth w-100 m-auto text-center">
	<form method="Post">
		<img class="logo mb-4" src="{{ url_for('static', filename='app_logo.png') }}" alt="logo">
		<h1 class="h3 mb-3 fw-normal">Please Register</h1>
        
		{% for message in get_flashed_messages() %}
			<div class="flash">{{ message }}</div>
		{% endfor %}
		<div class="form-floating">
			<input type="text" class="form-control" id="first_name" name="first_name" placeholder="First Name" required>
			<label for="first_name">First Name</label>
		</div>
		<div class="form-floating">
			<input type="text" class="form-control" id="last_name" name="last_name" placeholder="Last Name" required>
			<label for="last_name">Last Name</label>
		</div>
		<div class="form-floating">
			<input type="email" class="form-control" id="email" name="email" placeholder="name@example.com" required>
			<label for="email">Email address</label>
		</div>
		<div class="form-floating">
			<input type="password" class="form-control" name="password" id="password" placeholder="Password">
			<label for="password">Password</label>
		</div>
		<div class="form-floating">
			<input type="password" class="form-control" name="re_password" id="re_password" placeholder="Enter Password Again">
			<label for="re_password">Enter Password Again</label>
		</div>
		<div class="checkbox mb-3">
			<label>
				<input type="checkbox" value="is_teacher" name="user_type"> I am a teacher
			</label>
		</div>
		<button class="w-100 btn btn-lg btn-primary" type="submit">Register</button>
		<p class="mt-5 mb-3 text-muted">© Rida</p>
	</form>
</main>
{% endblock %}
